# API gateway (Phase 5): single entry point on :8080 that routes to the
# services. As of Day 23 the API services run as compose containers, so the
# gateway routes to their container DNS names. The frontend (Vite dev server)
# and the NLLB translate server still run on the host.
events {}

http {
  # Long timeouts: live transcription passes and Excel generation can take
  # several seconds; stop-with-audio uploads can be large.
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
  client_max_body_size 120m;

  # Docker's embedded DNS. Using variables in proxy_pass makes nginx resolve
  # per-request instead of at startup, so the gateway starts (and plain
  # `docker compose up -d` keeps working) even when the service containers
  # aren't running yet -- /api just 502s until they are. NOTE: this resolver
  # does not read /etc/hosts, so host.docker.internal must stay in a static
  # proxy_pass (resolved at startup via the extra_hosts entry).
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Only send "Connection: upgrade" when the client actually asked for a
  # websocket (Vite HMR); sending it on plain requests breaks proxying.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" "";
  }

  server {
    listen 8080;

    # Per-domain routing to the split services (Phase 5). The gateway is the
    # single entry point -- the frontend only ever talks to :8080/api.

    # auth-service: admin + doctor login/registration
    location /api/auth/ {
      set $auth_upstream auth-service:5001;
      proxy_pass http://$auth_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # conversation-service: sessions, transcripts, translation, Excel, audit.
    # Upgrade headers cover the live-transcript WebSocket
    # (/api/conversations/live); the shared map keeps plain requests plain.
    location /api/conversations/ {
      set $conversation_upstream conversation-service:5003;
      proxy_pass http://$conversation_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    location = /api/conversations {
      set $conversation_upstream conversation-service:5003;
      proxy_pass http://$conversation_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # patient-service: users, patients, appointments, uploaded ID documents
    location /api/ {
      set $patient_upstream patient-service:5002;
      proxy_pass http://$patient_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /uploads/ {
      set $patient_upstream patient-service:5002;
      proxy_pass http://$patient_upstream;
      proxy_set_header Host $host;
    }

    # Frontend (Vite dev server on the host; a production build would serve
    # static files). Static proxy_pass: see resolver note above.
    location / {
      proxy_pass http://host.docker.internal:5173;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;      # Vite HMR websocket
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
