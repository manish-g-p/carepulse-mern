# Render blueprint for the free-tier CarePulse backend (combined single
# process -- see backend/combined-server.js). Deploy via Render's "New +
# Blueprint" against this repo, then fill in the secret env vars in the
# dashboard (they are intentionally NOT stored here -- this file is public).
#
# The heavy AI (whisper/diarization/NLLB) is NOT part of this deploy; it needs
# more RAM than a free instance has. Recording/transcription/translation run
# in the local docker stack (see DEPLOY.md). Everything else works live.
services:
  - type: web
    name: carepulse-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Secrets -- set these in the Render dashboard (sync:false = not in repo).
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSKEY
        sync: false
      - key: AUDIO_ENCRYPTION_KEY
        sync: false
      # Your deployed frontend origin, e.g. https://carepulse.vercel.app
      # (comma-separated if more than one). Enables CORS from the frontend.
      - key: CLIENT_ORIGIN
        sync: false
      # One database for the combined instance (the split uses four).
      - key: COMBINED_DB
        value: carepulse
      # --- Health Records module (all optional free tiers; features degrade
      # gracefully when unset -- see .env.example). Safe to leave blank.
      # Gemini free tier: prescription-image parsing in the pharmacy assistant.
      - key: GEMINI_API_KEY
        sync: false
      # Cloudinary free tier: cloudinary://<api_key>:<api_secret>@<cloud_name>.
      # Unset = local-disk fallback (ephemeral on Render -- lost on redeploy).
      - key: CLOUDINARY_URL
        sync: false
      # Gmail app password for the daily 9 AM appointment reminder emails.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
