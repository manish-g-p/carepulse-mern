# Phase 5 infrastructure: message broker + API gateway.
#
#   docker compose up -d
#
# Topology (see ARCHITECTURE.md):
#   browser -> nginx gateway (:8080) -> API service (host :5000)
#                                    -> frontend    (host :5173)
#   API service -> RabbitMQ (:5672) -> speech worker (npm run worker)
#
# The Node services and the speech worker run on the HOST during dev rather
# than in containers: they shell out to the Windows-native whisper/ffmpeg
# binaries in backend/bin and the local Python venvs, which a Linux container
# can't run. Containerizing them means Linux builds of that tooling -- a
# deliberate later step. If RabbitMQ is down, the API falls back to
# processing speech in-process, so `docker compose up` is optional for dev.
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"    # AMQP (API service + worker)
      - "15672:15672"  # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
